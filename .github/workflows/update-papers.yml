name: Update PubMed papers

on:
  push:
    branches: ["main"]
    paths:
      - "fetch_papers.py"
      - ".github/workflows/update-papers.yml"
  schedule:
    - cron: "20 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest papers
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          NCBI_EMAIL: ${{ secrets.NCBI_EMAIL }}
        run: python fetch_papers.py --latest-limit 50 --archive-dir archive --max-summaries 20

      - name: Commit updated papers
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update PubMed papers"
          file_pattern: papers.json archive/*.json
